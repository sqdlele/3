{% extends 'base.html' %}
{% block title %}Категории{% endblock %}
{% block content %}
<h2>Категории</h2>
<a href="{% url 'blog:category_create' %}" class="btn btn-success mb-3">Добавить категорию</a>
<table class="table table-bordered">
    <thead>
        <tr><th>Название</th><th>Действия</th></tr>
    </thead>
    <tbody>
        {% for category in categories %}
        <tr>
            <td>{{ category.name }}</td>
            <td>
                <a href="{% url 'blog:category_update' category.pk %}" class="btn btn-warning btn-sm">Редактировать</a>
                <a href="{% url 'blog:category_delete' category.pk %}" class="btn btn-danger btn-sm">Удалить</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="2">Нет категорий.</td></tr>
        {% endfor %}
    </tbody>
</table>
<a href="{% url 'blog:article_list' %}" class="btn btn-secondary">Назад к статьям</a>
{% endblock %}
