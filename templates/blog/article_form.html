{% extends 'base.html' %}
{% block title %}Статья{% endblock %}
{% block content %}
<h2>{% if form.instance.pk %}Редактировать статью{% else %}Создать статью{% endif %}</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'blog:article_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
