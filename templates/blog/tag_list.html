{% extends 'base.html' %}
{% block title %}Теги{% endblock %}
{% block content %}
<h2>Теги</h2>
<a href="{% url 'blog:tag_create' %}" class="btn btn-success mb-3">Добавить тег</a>
<table class="table table-bordered">
    <thead>
        <tr><th>Название</th><th>Действия</th></tr>
    </thead>
    <tbody>
        {% for tag in tags %}
        <tr>
            <td>{{ tag.name }}</td>
            <td>
                <a href="{% url 'blog:tag_update' tag.pk %}" class="btn btn-warning btn-sm">Редактировать</a>
                <a href="{% url 'blog:tag_delete' tag.pk %}" class="btn btn-danger btn-sm">Удалить</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="2">Нет тегов.</td></tr>
        {% endfor %}
    </tbody>
</table>
<a href="{% url 'blog:article_list' %}" class="btn btn-secondary">Назад к статьям</a>
{% endblock %}
