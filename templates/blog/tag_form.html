{% extends 'base.html' %}
{% block title %}Тег{% endblock %}
{% block content %}
<h2>{% if form.instance.pk %}Редактировать тег{% else %}Добавить тег{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'blog:tag_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
