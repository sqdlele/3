{% extends 'base.html' %}
{% block title %}Удалить категорию{% endblock %}
{% block content %}
<h2>Удалить категорию</h2>
<p>Вы уверены, что хотите удалить категорию "{{ category.name }}"?</p>
<form method="post" class="app-form">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'blog:category_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
