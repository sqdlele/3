{% extends 'base.html' %}
{% block title %}Удалить тег{% endblock %}
{% block content %}
<h2>Удалить тег</h2>
<p>Вы уверены, что хотите удалить тег "{{ tag.name }}"?</p>
<form method="post" class="app-form">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'blog:tag_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
