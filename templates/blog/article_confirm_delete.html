{% extends 'base.html' %}
{% block title %}Удалить статью{% endblock %}
{% block content %}
<h2>Удалить статью</h2>
<p>Вы уверены, что хотите удалить статью "{{ article.title }}"?</p>
<form method="post" class="app-form">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'blog:article_detail' article.pk %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
